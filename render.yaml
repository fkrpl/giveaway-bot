services:
  - type: web
    name: giveaway-platform
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd $PROJECT_DIR && npm install && npm run build && cp -r dist backend/dist
    startCommand: cd backend && python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.7"
